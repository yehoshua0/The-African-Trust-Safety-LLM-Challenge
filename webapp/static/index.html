<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" href="https://assets.zindi.africa/favicon-96x96.png" sizes="96x96">
<link rel="icon" type="image/svg+xml" href="https://assets.zindi.africa/favicon.svg">
<link rel="shortcut icon" href="https://assets.zindi.africa/favicon.ico">
<link rel="apple-touch-icon" sizes="180x180" href="https://assets.zindi.africa/apple-touch-icon.png">
<title>Reproduce Lab — African T&S LLM Challenge</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<!-- ── Header ── -->
<header class="app-header">
  <div class="header-brand">
    <img src="https://assets.zindi.africa/apple-touch-icon.png" width="26" height="26" alt="Zindi" style="border-radius:6px;flex-shrink:0;">
    <div class="brand-name">
      Reproduce Lab
      <span>African T&amp;S LLM Challenge</span>
    </div>
  </div>
  <div class="header-breadcrumb" id="breadcrumb">
    <span>Attack Catalogue</span>
  </div>
  <nav class="header-nav">
    <button class="h-tab active" id="tab-attacks">Attacks</button>
  </nav>
  <div style="display:flex;gap:8px;align-items:center;padding:0 12px;">
    <span class="h-pill green" id="pill-count">— Attacks</span>
    <a class="h-btn-ghost" href="http://127.0.0.1:5500/docs/index.html" target="_blank" rel="noopener">↗ Dashboard</a>
  </div>
</header>

<!-- ── App body ── -->
<div class="app-body">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">

    <div class="sidebar-section">
      <div class="sidebar-label">Model</div>
      <div class="model-select-wrap">
        <select id="model-select">
          <option value="">Select model…</option>
          <option value="hausa">N-ATLaS — Hausa</option>
          <option value="igbo">N-ATLaS — Igbo</option>
          <option value="yoruba">N-ATLaS — Yoruba</option>
          <option value="swahili">Pawa-Gemma — Swahili</option>
        </select>
      </div>
      <button class="btn-load" id="btn-load">Load Model</button>
      <div class="model-status-bar msb-none" id="model-status-bar">
        <div class="status-dot sd-gray"></div>
        <span id="model-status-text">No model loaded</span>
      </div>
    </div>

  </aside>

  <!-- ── Main ── -->
  <div class="main">

    <!-- List view -->
    <div class="view" id="view-list">
      <div class="list-header">
        <div class="list-title">
          Attack Catalogue
          <span id="list-subtitle"></span>
        </div>
        <span class="result-badge" id="result-badge"></span>
      </div>
      <div id="card-list"></div>
      <div class="empty-msg" id="empty-msg" style="display:none">No attacks match the current filters.</div>
    </div>

    <!-- Detail view -->
    <div class="view hidden" id="view-detail">
      <div class="detail-header">
        <button class="btn-back" onclick="showList()">← Back to catalogue</button>
        <div>
          <span class="detail-id" id="d-id">—</span>
          <span class="detail-model" id="d-model">—</span>
        </div>
        <div class="detail-score-pill" id="d-score-pill">—</div>
      </div>
      <div class="detail-body" id="detail-body"></div>
    </div>

  </div>
</div>

<!-- ── Footer ── -->
<footer class="app-footer">
  <span>Reproduce Lab · Zindi African Trust &amp; Safety LLM Challenge · April 2026</span>
  <span>
    <a href="https://huggingface.co/QuantFactory/N-ATLaS-GGUF" target="_blank">N-ATLaS ↗</a>
    &nbsp;·&nbsp;
    <a href="https://huggingface.co/Skier8402/gemma2-2b-swahili-it-Q8_0-GGUF" target="_blank">Pawa-Gemma ↗</a>
    &nbsp;·&nbsp;
    <a href="https://zindi.africa/competitions/the-african-trust-safety-llm-challenge" target="_blank">Zindi ↗</a>
    &nbsp;·&nbsp;
    <a href="https://github.com/yehoshua0/The-African-Trust-Safety-LLM-Challenge" target="_blank">GitHub ↗</a>
  </span>
</footer>

<script src="/static/app.js"></script>
</body>
</html>
